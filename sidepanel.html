<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>BarcodeGen</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo-icon" aria-hidden="true">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
          <rect x="0"  y="0" width="3" height="16" fill="currentColor"/>
          <rect x="5"  y="3" width="1" height="10" fill="currentColor"/>
          <rect x="8"  y="0" width="4" height="16" fill="currentColor"/>
          <rect x="14" y="3" width="2" height="10" fill="currentColor"/>
          <rect x="18" y="0" width="2" height="16" fill="currentColor"/>
          <rect x="21" y="3" width="1" height="10" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="logo-text">BARCODE<span class="logo-accent">GEN</span></h1>
      <span class="version-tag">v1.2</span>
    </header>

    <!-- Feature Selector -->
    <div class="feature-select-wrap">
      <select id="feature-select" class="feature-select" aria-label="Select feature">
        <option value="barcode">Barcode Generator</option>
        <option value="arduino">Arduino BT Controller</option>
      </select>
    </div>

    <section id="feature-barcode">

    <!-- Mode Toggle -->
    <div class="toggle-wrap">
      <div class="toggle-track" role="group" aria-label="Output type">
        <div class="toggle-thumb" id="toggle-thumb" aria-hidden="true"></div>
        <button class="toggle-opt active" id="btn-qr" aria-pressed="true">QR CODE</button>
        <button class="toggle-opt" id="btn-barcode" aria-pressed="false">BARCODE</button>
      </div>
    </div>

    <!-- Format Selector (Barcode only) -->
    <div class="format-row hidden" id="format-row">
      <label class="field-label" for="format-select">FORMAT</label>
      <select id="format-select" class="format-select">
        <option value="CODE128">CODE 128</option>
        <option value="EAN13">EAN-13</option>
        <option value="EAN8">EAN-8</option>
        <option value="UPCA">UPC-A</option>
        <option value="CODE39">CODE 39</option>
        <option value="ITF14">ITF-14</option>
      </select>
    </div>

    <!-- Value Input -->
    <div class="input-row">
      <input
        type="text"
        id="value-input"
        class="value-input"
        placeholder="Enter text or URL…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Barcode value"
      >
    </div>

    <!-- Inline Error -->
    <div class="error-line hidden" id="error-line" role="alert" aria-live="polite"></div>

    <!-- Generate Button -->
    <button class="gen-btn" id="gen-btn">
      <span>GENERATE</span>
      <span class="gen-hint">↵ Enter</span>
    </button>

    <!-- Scan Window -->
    <div class="scan-window" id="scan-window" aria-label="Generated code output">
      <div class="scan-placeholder" id="scan-placeholder" aria-hidden="true">
        <div class="placeholder-bars">
          <span style="height:22px"></span>
          <span style="height:14px"></span>
          <span style="height:30px"></span>
          <span style="height:10px"></span>
          <span style="height:26px"></span>
          <span style="height:16px"></span>
          <span style="height:30px"></span>
        </div>
        <p class="placeholder-hint">Output appears here</p>
      </div>
      <div class="output-area hidden" id="output-area"></div>
    </div>

    <!-- Size Slider + Download -->
    <div class="controls-row">
      <div class="slider-group">
        <span class="field-label" id="size-label">SIZE</span>
        <input
          type="range"
          id="size-slider"
          class="size-slider"
          min="1" max="5" value="3"
          aria-label="Output size"
          aria-labelledby="size-label"
        >
        <span class="slider-badge" id="slider-badge">M</span>
      </div>
      <button class="dl-btn" id="dl-btn" disabled aria-label="Download as PNG">
        ↓ PNG
      </button>
    </div>

    <!-- History -->
    <div class="history-section" id="history-section">
      <div class="history-header" id="history-header">
        <span class="field-label">HISTORY</span>
        <span class="history-count" id="history-count">(0)</span>
        <button class="history-chevron" id="history-chevron" aria-label="Toggle history" aria-pressed="true">&#9660;</button>
      </div>
      <ul class="history-list" id="history-list"></ul>
    </div>

    </section> <!-- /feature-barcode -->

    <section id="feature-arduino" class="hidden">
      <div class="ard-panel">

        <!-- Device Config -->
        <div class="ard-config-row">
          <div class="ard-field-group">
            <label class="field-label" for="ard-device-name">DEVICE NAME</label>
            <input type="text" id="ard-device-name" class="ard-input" value="ESP32_WS"
                   autocomplete="off" spellcheck="false" aria-label="Bluetooth device name">
          </div>
          <button class="ard-btn-secondary" id="ard-btn-test">TEST</button>
        </div>

        <!-- Compatibility warning (hidden by default) -->
        <div class="ard-compat-warn hidden" id="ard-compat-warn" role="alert">
          Web Bluetooth requires Chrome on desktop or Android.
        </div>

        <!-- Connect row -->
        <div class="ard-connect-row">
          <div class="ard-status-dot" id="ard-status-dot" aria-hidden="true"></div>
          <button class="ard-btn-connect" id="ard-btn-connect">CONNECT</button>
        </div>

        <div class="ard-divider"></div>

        <!-- Manual send -->
        <label class="field-label" for="ard-value-input">VALUE TO SEND</label>
        <div class="ard-send-row">
          <input type="text" id="ard-value-input" class="ard-input"
                 placeholder="Enter value..." disabled autocomplete="off" spellcheck="false">
          <button class="ard-btn-send" id="ard-btn-send" disabled>SEND</button>
        </div>

        <div class="ard-divider"></div>

        <!-- Sequence mode -->
        <div class="field-label" style="margin-bottom:8px">SEQUENCE MODE</div>
        <div class="ard-seq-grid">
          <div class="ard-field-group">
            <label class="field-label" for="ard-increment">INCREMENT</label>
            <input type="number" id="ard-increment" class="ard-input" value="10" min="1" disabled>
          </div>
          <div class="ard-field-group">
            <label class="field-label" for="ard-max-value">MAX VALUE</label>
            <input type="number" id="ard-max-value" class="ard-input" value="100" min="1" disabled>
          </div>
          <div class="ard-field-group">
            <label class="field-label" for="ard-threshold">THRESHOLD</label>
            <input type="number" id="ard-threshold" class="ard-input" value="0" disabled>
          </div>
          <div class="ard-field-group">
            <label class="field-label" for="ard-delay">DELAY (MS)</label>
            <input type="number" id="ard-delay" class="ard-input" value="3000" min="0" disabled>
          </div>
        </div>

        <!-- Validation error -->
        <div class="ard-seq-error hidden" id="ard-seq-error" role="alert"></div>

        <!-- Start/stop button -->
        <button class="ard-btn-start" id="ard-btn-start" disabled>START</button>

        <!-- Sequence progress (hidden until running) -->
        <div class="ard-seq-progress hidden" id="ard-seq-progress">
          <div class="ard-progress-header">
            <span id="ard-progress-label">Sequence progress</span>
            <span id="ard-progress-step"></span>
          </div>
          <div class="ard-progress-track">
            <div class="ard-progress-fill" id="ard-progress-fill"></div>
          </div>
        </div>

        <div class="ard-divider"></div>

        <!-- Activity log -->
        <div class="ard-log-header">
          <span class="field-label">ACTIVITY LOG</span>
          <button class="ard-btn-clear-log" id="ard-btn-clear-log">CLEAR</button>
        </div>
        <div class="ard-log-box" id="ard-log-box" aria-live="polite"></div>

      </div>
    </section>

  </div>

  <script src="libs/jsbarcode.min.js"></script>
  <script src="libs/qrcode.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
